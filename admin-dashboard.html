<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
        }

        .container {
            width: 400px;
            margin: 100px auto;
            background: white;
            padding: 20px;
            box-shadow: 0px 0px 10px gray;
            border-radius: 10px;
            text-align: center;
        }

        h2 {
            color: green;
        }

        .info {
            margin-top: 20px;
            text-align: left;
        }

        .info p {
            font-size: 16px;
            margin: 5px 0;
        }

        button {
            margin-top: 20px;
            padding: 10px;
            width: 100%;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkred;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Admin Dashboard</h2>

    <div id="welcome"></div>

    <div class="info" id="adminInfo"></div>

    <button onclick="logout()">Logout</button>
</div>

<script>
    async function loadDashboard() {
        try {
            const response = await fetch("http://localhost:3000/admin/dashboard", {
                method: "GET",
                credentials: "include" // important for session
            });

            const data = await response.json();

            if (response.status === 200) {
                document.getElementById("welcome").innerHTML =
                    `<h3>${data.message}</h3>`;

                document.getElementById("adminInfo").innerHTML = `
                    <p><strong>ID:</strong> ${data.admin.id}</p>
                    <p><strong>Name:</strong> ${data.admin.name}</p>
                    <p><strong>Email:</strong> ${data.admin.email}</p>
                `;
            } else {
                alert(data.message);
                window.location.href = "admin-login.html";
            }

        } catch (error) {
            console.error("Error:", error);
            alert("Server error");
        }
    }

    // Logout function
    async function logout() {
        try {
            await fetch("http://localhost:3000/admin/logout", {
                method: "GET",
                credentials: "include"
            });

            window.location.href = "admin-login.html";

        } catch (error) {
            console.error("Logout error:", error);
        }
    }

    // Load dashboard on page load
    loadDashboard();
</script>

</body>
</html>
